<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeLock - My Photos</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body.photos-page{
      min-height:100vh;
      padding:40px 6%;
      background:
        radial-gradient(circle at top left, rgba(0,255,170,.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,.12), transparent 30%),
        #0b1020;
      color:#fff;
    }

    .photos-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:35px;
      flex-wrap:wrap;
    }

    .photos-title h1{
      font-size:2.5rem;
      margin-bottom:8px;
      color:#00e3ab;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .photos-title p{
      color:rgba(255,255,255,.7);
      font-size:1rem;
    }

    .header-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .glass-card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;
      padding:28px;
      backdrop-filter:blur(18px);
      box-shadow:0 20px 40px rgba(0,0,0,.35);
      margin-bottom:30px;
    }

    .upload-section{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .upload-left{
      display:flex;
      align-items:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .upload-icon{
      width:64px;
      height:64px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.6rem;
      background:linear-gradient(135deg,#00e3ab,#00a8ff);
      color:#fff;
    }

    .upload-text h2{
      margin:0 0 6px;
      font-size:1.3rem;
    }

    .upload-text p{
      margin:0;
      color:rgba(255,255,255,.7);
    }

    .custom-file{
      position:relative;
      overflow:hidden;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 18px;
      border-radius:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      cursor:pointer;
      color:#fff;
    }

    .custom-file input{
      position:absolute;
      inset:0;
      opacity:0;
      cursor:pointer;
    }

    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:24px;
      margin-top:10px;
    }

    .photo-card{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:22px;
      overflow:hidden;
      transition:all .3s ease;
    }

    .photo-card:hover{
      transform:translateY(-8px);
      border-color:rgba(0,227,171,.45);
      box-shadow:0 18px 35px rgba(0,0,0,.35);
    }

    .photo-preview{
      width:100%;
      height:220px;
      background:#111827;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .photo-preview img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .photo-content{
      padding:18px;
    }

    .photo-name{
      font-size:1rem;
      font-weight:600;
      margin-bottom:16px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .photo-actions{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:11px 14px;
      font-size:.92rem;
      font-weight:600;
      cursor:pointer;
      text-align:center;
      transition:.25s ease;
      color:#fff;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn-primary{
      background:linear-gradient(135deg,#00e3ab,#00a8ff);
    }

    .btn-secondary{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
    }

    .btn-danger{
      background:rgba(255,77,109,.18);
      color:#ff7d94;
      border:1px solid rgba(255,125,148,.25);
    }

    .empty-state{
      text-align:center;
      padding:50px 20px;
      color:rgba(255,255,255,.75);
    }

    .empty-state i{
      font-size:3rem;
      color:#00e3ab;
      margin-bottom:18px;
    }

    @media(max-width:768px){
      .photos-header,
      .upload-section{
        flex-direction:column;
        align-items:stretch;
      }

      .photo-actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body class="photos-page">

  <div class="photos-header">
    <div class="photos-title">
      <h1><i class="fa-solid fa-images"></i> My Photos</h1>
      <p>Securely manage and access your private images</p>
    </div>

    <div class="header-actions">
      <button class="btn btn-secondary" onclick="goBack()">
        <i class="fa-solid fa-arrow-left"></i> Dashboard
      </button>

      <button class="btn btn-danger" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>
  </div>

  <div id="result"></div>

  <script>
    const token = sessionStorage.getItem("token");

    if (!token) {
      window.location.href = "login.html";
    }

    function goBack() {
      window.location.href = "dashboard.html";
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = "login.html";
    }

    async function uploadPhoto() {
      const fileInput = document.getElementById("photoFile");

      if (!fileInput.files.length) {
        alert("Please select a photo");
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);
      formData.append("fileType", "photo");

      try {
        const response = await fetch(
          "http://127.0.0.1:5000/api/files/upload",
          {
            method: "POST",
            headers: {
              Authorization: "Bearer " + token
            },
            body: formData
          }
        );

        if (response.ok) {
          alert("Photo uploaded successfully");
          loadPhotos();
        } else {
          const data = await response.json();
          alert(data.message || "Upload failed");
        }
      } catch (error) {
        console.error(error);
        alert("Cannot connect to backend");
      }
    }

    async function deleteFile(id) {
      if (!confirm("Delete this photo?")) return;

      try {
        const response = await fetch(
          `http://127.0.0.1:5000/api/files/${id}`,
          {
            method: "DELETE",
            headers: {
              Authorization: "Bearer " + token
            }
          }
        );

        if (response.ok) {
          loadPhotos();
        } else {
          alert("Delete failed");
        }
      } catch (error) {
        console.error(error);
        alert("Cannot connect to backend");
      }
    }

    async function viewPhoto(id) {
      try {
        const response = await fetch(
          `http://127.0.0.1:5000/api/files/view/${id}`,
          {
            headers: {
              Authorization: "Bearer " + token
            }
          }
        );

        if (!response.ok) {
          alert("Unable to open photo");
          return;
        }

        const blob = await response.blob();
        const imageURL = URL.createObjectURL(blob);

        window.open(imageURL, "_blank");
      } catch (error) {
        console.error(error);
        alert("Cannot connect to backend");
      }
    }

    async function downloadPhoto(id) {
      try {
        const response = await fetch(
          `http://127.0.0.1:5000/api/files/download/${id}`,
          {
            headers: {
              Authorization: "Bearer " + token
            }
          }
        );

        if (!response.ok) {
          alert("Download failed");
          return;
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "";
        document.body.appendChild(a);
        a.click();
        a.remove();

        URL.revokeObjectURL(url);
      } catch (error) {
        console.error(error);
        alert("Cannot connect to backend");
      }
    }

    async function loadPhotos() {
      try {
        const response = await fetch(
          "http://127.0.0.1:5000/api/files/my-files",
          {
            headers: {
              Authorization: "Bearer " + token
            }
          }
        );

        const files = await response.json();
        const photoFiles = files.filter(file => file.fileType === "photo");

        let html = `
          <div class="glass-card upload-section">
            <div class="upload-left">
              <div class="upload-icon">
                <i class="fa-solid fa-cloud-arrow-up"></i>
              </div>

              <div class="upload-text">
                <h2>Welcome, ${sessionStorage.getItem("username") || "User"}</h2>
                <p>Select an image and upload it securely to SafeLock.</p>
              </div>
            </div>

            <div class="upload-left">
              <label class="custom-file">
                <i class="fa-solid fa-image"></i>
                Choose Photo
                <input type="file" id="photoFile" accept="image/*">
              </label>

              <button class="btn btn-primary" onclick="uploadPhoto()">
                <i class="fa-solid fa-upload"></i> Upload
              </button>
            </div>
          </div>
        `;

        if (photoFiles.length === 0) {
          html += `
            <div class="glass-card empty-state">
              <i class="fa-regular fa-image"></i>
              <h2>No Photos Yet</h2>
              <p>Upload your first private photo to get started.</p>
            </div>
          `;
        } else {
          html += `<div class="gallery-grid">`;

          photoFiles.forEach(file => {
            html += `
              <div class="photo-card">
                <div class="photo-preview">
                  <img
                    src="http://127.0.0.1:5000/api/files/view/${file._id}"
                    alt="${file.fileName}"
                  >
                </div>

                <div class="photo-content">
                  <div class="photo-name">${file.fileName}</div>

                  <div class="photo-actions">
                    <button
                      class="btn btn-primary"
                      onclick="viewPhoto('${file._id}')"
                    >
                      View
                    </button>

                    <button
                      class="btn btn-secondary"
                      onclick="downloadPhoto('${file._id}')"
                    >
                      Download
                    </button>

                    <button
                      class="btn btn-danger"
                      onclick="deleteFile('${file._id}')"
                    >
                      Delete
                    </button>
                  </div>
                </div>
              </div>
            `;
          });

          html += `</div>`;
        }

        document.getElementById("result").innerHTML = html;
      } catch (error) {
        console.error(error);

        document.getElementById("result").innerHTML = `
          <div class="glass-card empty-state">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <h2>Unable to Load Photos</h2>
            <p>Please check whether your backend is running.</p>
          </div>
        `;
      }
    }

    loadPhotos();
  </script>
</body>
</html>
